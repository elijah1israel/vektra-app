name: vektra_app
description: "VektraPro — precision trading signals"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  dio: ^5.7.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.15
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/vektra-icon.svg
    - assets/vektra-logo.svg
    - assets/vektra-icon.png
    - assets/vektra-logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/vektra-icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#05080F"
  adaptive_icon_foreground: "assets/vektra-icon.png"
