name: Build APK

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.24.5"
  JAVA_VERSION: "17"

jobs:
  analyze:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Fetch dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build release APK (split per ABI)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          DEFINES=""
          if [ -n "$API_BASE_URL" ]; then
            DEFINES="--dart-define=API_BASE_URL=$API_BASE_URL"
          fi
          flutter build apk \
            --release \
            --split-per-abi \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }} \
            $DEFINES

      - name: Build universal release APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          DEFINES=""
          if [ -n "$API_BASE_URL" ]; then
            DEFINES="--dart-define=API_BASE_URL=$API_BASE_URL"
          fi
          flutter build apk \
            --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }} \
            $DEFINES

      - name: Stage APK artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "artifacts/vektra-1.0.${{ github.run_number }}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "artifacts/vektra-1.0.${{ github.run_number }}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "artifacts/vektra-1.0.${{ github.run_number }}-x86_64.apk"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "artifacts/vektra-1.0.${{ github.run_number }}-universal.apk"
          ls -lh artifacts

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vektra-apk-1.0.${{ github.run_number }}-${{ github.sha }}
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30
