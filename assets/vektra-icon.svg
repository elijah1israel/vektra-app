<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="bull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#vignette)"/>
  <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="#1f2937" stroke-width="1"/>

  <!-- Bullish candle (small, green) -->
  <g>
    <rect x="182" y="110" width="6" height="330" fill="url(#bull)"/>
    <rect x="150" y="170" width="70" height="180" fill="url(#bull)"/>
  </g>

  <!-- Bearish engulfing candle (large, red) -->
  <g>
    <rect x="322" y="80" width="6" height="360" fill="url(#bear)"/>
    <rect x="265" y="130" width="120" height="270" fill="url(#bear)"/>
  </g>
</svg>
